################################################################################
# RanSynSrv - Docker Compose Configuration
################################################################################
# Nginx + PHP 8.4 + GoAccess + Claude Code + Dev Tools
# Integrates: stdout-logs, package-install, nvm functionality
################################################################################

services:
  ransynsrv:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
        TZ: ${TZ:-Asia/Dubai}

    image: ransynsrv:latest
    hostname: ransynsrv

    # no-new-privileges blocks sudo re-escalation after the init phase drops to
    # `abc`, limiting blast radius of any PHP RCE. mem_limit caps memory so a
    # runaway worker can't OOM the host.
    security_opt:
      - no-new-privileges:true
    mem_limit: 2g

    environment:
      # User/Group IDs
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Dubai}
      
      # PHP Settings
      - PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT:-256M}
      - PHP_MAX_UPLOAD=${PHP_MAX_UPLOAD:-50M}
      - PHP_MAX_POST=${PHP_MAX_POST:-50M}
      - PHP_MAX_EXECUTION_TIME=${PHP_MAX_EXECUTION_TIME:-300}
      
      # GoAccess
      - GOACCESS_ENABLED=${GOACCESS_ENABLED:-true}
      - GOACCESS_WS_URL=${GOACCESS_WS_URL:-}
      - GOACCESS_AUTH_ENABLED=${GOACCESS_AUTH_ENABLED:-false}
      - GOACCESS_USERNAME=${GOACCESS_USERNAME:-admin}
      - GOACCESS_PASSWORD=${GOACCESS_PASSWORD:-}

      # ttyd Web Terminal
      - TTYD_ENABLED=${TTYD_ENABLED:-false}
      - TTYD_USERNAME=${TTYD_USERNAME:-admin}
      - TTYD_PASSWORD=${TTYD_PASSWORD:-}

      # Claude Code API Key
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

      # Claude Code musl libc compatibility (Alpine Linux)
      - USE_BUILTIN_RIPGREP=0
      
      # Runtime Package Install (universal-package-install mod)
      - INSTALL_PACKAGES=${INSTALL_PACKAGES:-}
      - INSTALL_PIP_PACKAGES=${INSTALL_PIP_PACKAGES:-}
      
      # Stdout Logging (universal-stdout-logs mod)
      - DOCKER_LOGS=${DOCKER_LOGS:-false}

    volumes:
      # All persistent data in one place (nginx, www, logs, claude, scripts, history)
      - ${DATA_PATH:-./data}:/data

    ports:
      - "${HTTP_PORT:-8080}:80"


    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    labels:
      - "io.ransynsrv.description=Nginx + PHP 8.4 + GoAccess + Claude Code + optional pgvector AI sidecar"

