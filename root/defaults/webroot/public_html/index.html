<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RanSynSrv</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #eee;
        }
        .container { text-align: center; padding: 2rem; }
        h1 { 
            font-size: 2.5rem; 
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { font-size: 1rem; opacity: 0.8; margin-bottom: 2rem; }
        .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        a {
            padding: 0.6rem 1.2rem;
            background: rgba(233, 69, 96, 0.15);
            border: 1px solid #e94560;
            border-radius: 6px;
            color: #e94560;
            text-decoration: none;
            transition: all 0.2s;
        }
        a:hover { background: #e94560; color: #fff; }
        .status { margin-top: 2rem; font-family: monospace; font-size: 0.85rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>RanSynSrv</h1>
        <p class="subtitle">Nginx + PHP 8.4 + GoAccess + Claude Code</p>
        <div class="links">
            <a href="/goaccess">Analytics</a>
            <a href="/health">Health</a>
        </div>
        <p class="status">Server is running</p>
    </div>
</body>
</html>
