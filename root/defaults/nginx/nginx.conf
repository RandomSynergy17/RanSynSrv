worker_processes auto;
pid /run/nginx/nginx.pid;
error_log /data/log/nginx/error.log warn;

include /etc/nginx/modules/*.conf;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    # Strip the `Server:` brand entirely (not just the version, which
    # server_tokens off already handles). Requires nginx-mod-http-headers-more.
    more_clear_headers Server;
    client_max_body_size 50M;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /data/log/nginx/access.log main;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript image/svg+xml;

    brotli on;
    brotli_comp_level 6;
    brotli_types text/plain text/css text/xml application/json application/javascript
                 application/xml application/xml+rss text/javascript image/svg+xml;

    # Real IP Configuration for Reverse Proxies
    # SECURITY: Only trust specific proxy IPs to prevent IP spoofing
    # Uncomment and configure with your actual reverse proxy IP(s):
    # set_real_ip_from 172.17.0.1;     # Docker bridge gateway
    # set_real_ip_from 10.0.0.5;       # Your specific proxy IP
    # real_ip_header X-Forwarded-For;
    # real_ip_recursive on;
    #
    # Default: Disabled for security (no trusted proxies)

    upstream php {
        server unix:/run/php/php-fpm.sock;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        root /data/webroot/public_html;
        index index.php index.html;

        # Use relative redirects to preserve port in Docker port-mapped environments
        absolute_redirect off;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        # Content-Security-Policy is intentionally NOT set at the container
        # level — hosted apps need their own policy (inline scripts, specific
        # CDNs, style-src hashes, etc.). Recommended starting point for a new
        # app is to uncomment the line below and tighten per-app:
        # add_header Content-Security-Policy "default-src 'self'; object-src 'none'; frame-ancestors 'self'" always;
        # HSTS is handled by the reverse proxy in front of this container.

        # Block common editor/backup/database file patterns from being served.
        # If you legitimately need to serve any of these, narrow this rule to
        # specific paths (e.g. `location /public-db/` that whitelists them).
        location ~* \.(bak|swp|swo|orig|tmp|old|sql|db|sqlite|sqlite3|log|env)$ {
            deny all;
            return 404;
        }

        location = /health {
            access_log off;
            default_type text/plain;
            return 200 'OK';
        }

        location /goaccess/ {
            alias /data/webroot/goaccess/;
            index index.html;
            try_files $uri $uri/ =404;

            # HTTP Basic Authentication — managed by init-ransynsrv at boot.
            # The init script rewrites the directives between these two markers
            # based on GOACCESS_AUTH_ENABLED / GOACCESS_USERNAME / GOACCESS_PASSWORD.
            # Do not edit by hand unless you understand init's write_marker_block.
            # GOACCESS_AUTH_BEGIN
            auth_basic off;
            # GOACCESS_AUTH_END
        }

        location = /goaccess {
            rewrite ^ /goaccess/ permanent;
        }

        location /goaccess/ws {
            proxy_pass http://127.0.0.1:7890;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            # Target is loopback-only; hardcode Host to prevent passthrough of
            # untrusted upstream Host headers.
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # ttyd Web Terminal (optional, enable with TTYD_ENABLED=true).
        # Auth is enforced HERE at the nginx layer, not at ttyd (see init-
        # ransynsrv's TTYD_AUTH marker-block edit). ttyd itself runs with no
        # -c flag so the credential never hits argv / /proc/<pid>/cmdline.
        location /ttyd/ {
            # TTYD_AUTH_BEGIN
            auth_basic off;
            # TTYD_AUTH_END

            proxy_pass http://127.0.0.1:7681/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_buffering off;
        }

        location = /ttyd {
            rewrite ^ /ttyd/ permanent;
        }

        location ~ /\. { deny all; }

        location ~ \.php$ {
            fastcgi_pass php;
            fastcgi_index index.php;
            # $document_root (not $realpath_root) — don't resolve symlinks
            # inside public_html before handing the path to PHP-FPM, so a
            # symlinked include doesn't leak its real filesystem path.
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            # fastcgi timeouts are regenerated from ${PHP_MAX_EXECUTION_TIME}
            # on every boot by init-ransynsrv. Keeps nginx-side timeout in
            # sync with PHP's so raising the env var doesn't silently 504.
            include /data/nginx/php-timeout.conf;
            fastcgi_buffering on;
            fastcgi_buffer_size 16k;
            fastcgi_buffers 16 16k;
        }

        location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|svg|ttf|eot)$ {
            expires 7d;
            access_log off;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }
    }
}
