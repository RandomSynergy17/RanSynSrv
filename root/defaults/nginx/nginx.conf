worker_processes auto;
pid /run/nginx/nginx.pid;
error_log /data/log/nginx/error.log warn;

include /etc/nginx/modules/*.conf;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 100M;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /data/log/nginx/access.log main;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript image/svg+xml;

    brotli on;
    brotli_comp_level 6;
    brotli_types text/plain text/css text/xml application/json application/javascript
                 application/xml application/xml+rss text/javascript image/svg+xml;

    # Real IP Configuration for Reverse Proxies
    # SECURITY: Only trust specific proxy IPs to prevent IP spoofing
    # Uncomment and configure with your actual reverse proxy IP(s):
    # set_real_ip_from 172.17.0.1;     # Docker bridge gateway
    # set_real_ip_from 10.0.0.5;       # Your specific proxy IP
    # real_ip_header X-Forwarded-For;
    # real_ip_recursive on;
    #
    # Default: Disabled for security (no trusted proxies)

    upstream php {
        server unix:/run/php/php-fpm.sock;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        root /data/webroot/public_html;
        index index.php index.html;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        location = /health {
            access_log off;
            default_type text/plain;
            return 200 'OK';
        }

        location /goaccess {
            alias /data/webroot/goaccess;
            index index.html;
            try_files $uri $uri/ =404;
        }

        location /goaccess/ws {
            proxy_pass http://127.0.0.1:7890;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        location ~ /\. { deny all; }

        location ~ \.php$ {
            fastcgi_pass php;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 300;
            fastcgi_buffering on;
            fastcgi_buffer_size 16k;
            fastcgi_buffers 16 16k;
        }

        location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|svg|ttf|eot)$ {
            expires 7d;
            access_log off;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }
    }
}
